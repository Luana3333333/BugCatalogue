<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wiki Bug Paradise</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanalei+Fill&family=Pirata+One&family=Racing+Sans+One&display=swap" rel="stylesheet">
  <style>
    .fly-container {
      position: fixed;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: white;
    }

    .fliegender-kaefer {
      position: absolute;
      width: 80px;
      height: 80px;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.1s;
    }
  </style>
</head>
<body>
  <div class="fly-container" id="fly-container"></div>
  <script src="fly.js"></script>
</body>
</html>
